---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 3
  image: nginx:latest
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
spec:
  type: ClusterIP
  port: 80
  targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
data:
  app_env: Production
  log_level: info
  max_connection: "100"
